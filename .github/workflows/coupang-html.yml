name: Get Coupang HTML

on:
  workflow_dispatch:

jobs:
  get-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm i playwright
          npx playwright install --with-deps chromium

      - name: Get final HTML
        run: node scripts/get-coupang-html.js

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coupang-final-html
          path: |
            final.html
            final-url.txt
            screenshot.png
